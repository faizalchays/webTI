<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inovasi Teknologi</title>
    <style>
        :root {
            color-scheme: light;
            color: #1b1f23;
            background: #f4f7fb;
            font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        }
        * { box-sizing: border-box; }
        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top left, #e7f2ff 0%, transparent 35%),
                        radial-gradient(circle at bottom right, #fce8df 0%, transparent 30%),
                        #f4f7fb;
            color: #111827;
            line-height: 1.7;
        }
        .page {
            max-width: 860px;
            margin: 0 auto;
            padding: 44px 32px;
        }
        nav {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 32px;
        }
        button {
            border: none;
            border-radius: 999px;
            background: #1f56ff;
            color: #ffffff;
            padding: 12px 20px;
            font-size: 15px;
            font-weight: 600;
            transition: transform 0.2s ease, background 0.2s ease, box-shadow 0.2s ease;
            cursor: pointer;
            box-shadow: 0 12px 28px rgba(31, 86, 255, 0.18);
        }
        button:hover {
            transform: translateY(-1px);
            background: #1747cc;
        }
        h1 {
            margin-top: 0;
            font-size: clamp(2rem, 3vw, 2.8rem);
        }
        p {
            max-width: 90ch;
            margin-bottom: 1.4rem;
        }
        .card {
            background: #ffffff;
            border-radius: 28px;
            padding: 28px;
            box-shadow: 0 22px 56px rgba(15, 23, 42, 0.08);
        }
    </style>
</head>
<body>
    <div class="page">
        <nav>
            <button onclick="location.href='index.html'">Beranda</button>
            <button onclick="location.href='about.html'">Tentang</button>
        </nav>
        <div class="card">
            <h1>Inovasi Teknologi</h1>
            <p>Teknologi inovatif seperti kecerdasan buatan, realitas virtual, dan energi terbarukan membuka peluang baru di berbagai bidang.</p>
            <p>Banyak produk modern menggabungkan data dan otomasi untuk menciptakan pengalaman yang lebih cerdas, efisien, dan ramah lingkungan bagi pengguna.</p>
        </div>
    </div>
</body>
</html>
